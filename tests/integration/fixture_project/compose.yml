services:
  web:
    build: .
    ports:
      - "${TEST_PORT:-8080}:8080"
    environment:
      DATABASE_URL: "postgresql://testuser:testpass@db:5432/testdb"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 2s
      timeout: 5s
      retries: 10
