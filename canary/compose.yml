services:
  web:
    build: .
    ports:
      - "${CANARY_PORT:-19876}:8080"
    environment:
      DATABASE_URL: "postgresql://canary:canary@db:5432/canarydb"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: canary
      POSTGRES_PASSWORD: canary
      POSTGRES_DB: canarydb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canary -d canarydb"]
      interval: 2s
      timeout: 5s
      retries: 10
