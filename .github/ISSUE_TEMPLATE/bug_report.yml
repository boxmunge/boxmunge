name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug — what did you expect vs what actually happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the issue.
      placeholder: |
        1. Run `boxmunge deploy myapp`
        2. Observe error...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: boxmunge version
      description: Output of `boxmunge --version`
      placeholder: "0.2.0+abc1234"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      description: Server OS (e.g. Debian 13, Ubuntu 24.04)
      placeholder: "Debian 13"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant output from `boxmunge log --level error --since 1h` or the command that failed.
      render: shell
