name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run tests
        run: |
          pip install -e '.[tui]'
          pip install pytest
          python -m pytest tests/ --ignore=tests/integration --ignore=tests/vm -v

      - name: Build installer
        run: make installer

      - name: Generate SBOM
        run: |
          pip install cyclonedx-bom
          bash scripts/generate-sbom.sh

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        continue-on-error: true
        id: cosign

      - name: Sign artifacts
        if: steps.cosign.outcome == 'success'
        run: |
          cosign sign-blob --yes \
            --output-signature dist/boxmunge-install.sig \
            dist/boxmunge-install.sh
          sha256sum dist/boxmunge-install.sh > dist/SHA256SUMS

      - name: Generate checksums (unsigned)
        if: steps.cosign.outcome != 'success'
        run: sha256sum dist/boxmunge-install.sh > dist/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/boxmunge-install.sh
            dist/boxmunge-install.sig
            dist/SHA256SUMS
            dist/sbom.json
          fail_on_unmatched_files: false
          generate_release_notes: true
