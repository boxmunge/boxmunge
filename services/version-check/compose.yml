services:
  web:
    build: .
    restart: unless-stopped
    # Hardening (read_only rootfs, /tmp tmpfs, no-new-privileges, init,
    # cap_drop, pids_limit) is provided automatically by boxmunge's
    # default-profile overlay.
    #
    # Persistent storage (the check-data volume at /data) is declared
    # in manifest.yml under services.web.writable.persistent. boxmunge
    # owns the volume name and the top-level volumes: block in the
    # generated overlay. Do NOT add volumes: or tmpfs: here for v0.9+
    # schema-3 projects — that is a deploy-time error. See:
    # agent-help writable.
