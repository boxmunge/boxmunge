services:
  web:
    build: .
    restart: unless-stopped
    volumes:
      - check-data:/data
    # Hardening (read_only rootfs, /tmp tmpfs, no-new-privileges, init,
    # cap_drop, pids_limit) is provided automatically by boxmunge's
    # default-profile overlay. Do not redeclare those here — the overlay
    # generator omits its read_only/tmpfs additions when user compose
    # already declares them, but redundant declarations clutter the
    # source and risk merge-time conflicts on later additions.
    #
    # To opt out of the read_only default: declare `read_only: false`
    # explicitly (incurs +1 hardening penalty in CVE policy).

volumes:
  check-data:
