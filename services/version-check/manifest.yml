schema_version: 3
id: 01VERSIONCHECK000000000000
project: boxmunge-web
source: bundle
hosts:
  - boxmunge.dev
services:
  web:
    port: 8147
    routes:
      - path: /
    health: /v1/check?v=0.0.0
    smoke: boxmunge-scripts/smoke.sh
    writable:
      persistent:
        - name: check-data
          mount: /data
backup:
  type: volume
  # boxmunge captures the dump command's stdout into the encrypted snapshot,
  # then on restore pipes it back into stdin. The container only has
  # check-data:/data mounted; there is no /backup mount.
  dump_command: "cat /data/checks.db"
  restore_command: "cat > /data/checks.db"
  retention: 7
