<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scheduled maintenance</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f5;
      --fg: #1f2330;
      --accent: #5563de;
      --muted: #6b7280;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1a1c23; --fg: #e6e7eb; --accent: #8794ee; --muted: #9aa0ad; }
    }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      line-height: 1.6;
    }
    .card {
      max-width: 32rem;
      padding: 3rem 2rem;
      text-align: center;
    }
    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin: 0 0 1rem 0;
    }
    p {
      color: var(--muted);
      margin: 0;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Scheduled maintenance</div>
    <h1>This site will be back shortly.</h1>
    <p>We're carrying out planned maintenance. Thank you for your patience.</p>
  </main>
</body>
</html>
